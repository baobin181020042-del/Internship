name: Deploy Mai Xuan Truong internship report

on:
  push:
    branches:
      - intern/mai-xuan-truong
    paths:
      - "submissions/mai-xuan-truong/fcj-workshop-template-main/**"
      - ".github/workflows/deploy-mai-xuan-truong-report.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-deploy:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: submissions/mai-xuan-truong/fcj-workshop-template-main

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v2
        with:
          hugo-version: "0.160.1"
          extended: true

      - name: Build website
        run: hugo --minify --baseURL "https://mxt2003.github.io/Internship/"

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./submissions/mai-xuan-truong/fcj-workshop-template-main/public
          publish_branch: gh-pages
          force_orphan: true
